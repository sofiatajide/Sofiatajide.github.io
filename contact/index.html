	<style>
		#connect-with-me {
			text-align: center;
			margin: 40px auto;
			max-width: 600px;
		}

		#connect-with-me h2 {
			font-size: 2rem;
			color: #333;
		}

		#connect-with-me p {
			font-size: 1.2rem;
			color: #555;
			line-height: 1.5;
		}

		#connect-with-me a {
			color: #007BFF;
			text-decoration: underline;
			transition: color 0.3s ease;
		}

		#connect-with-me a:hover {
			color: #0056b3;
		}

		/* Additional styling */
		.icons.alt {
			display: flex;
			justify-content: center;
			margin: 20px auto;
		}

		.contact-section {
			background-color: #f9f9f9;
			padding: 60px 20px;
			text-align: center;
			border-top: 1px solid #ddd;
			font-family: 'Segoe UI', sans-serif;
		}

		.contact-section h2 {
			font-size: 2em;
			margin-bottom: 10px;
		}

		.contact-section p {
			font-size: 1.1em;
			margin-bottom: 30px;
			color: #555;
		}

		.contact-buttons {
			display: flex;
			justify-content: center;
			/* centers horizontally */
			gap: 16px;
			margin-top: 20px;
		}

		.contact-button {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 14px 24px;
			font-size: 1em;
			font-weight: 600;
			text-decoration: none;
			border-radius: 8px;
			transition: background-color 0.3s ease, transform 0.2s ease;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			color: white;
			/* ensures white text */
		}

		.contact-button.email {
			background-color: #333;
		}

		.contact-button.linkedin {
			background-color: #0a66c2;
			color: white;
			/* override any inherited styles */
		}


		.contact-button.linkedin {
			background-color: #0a66c2;
			color: white !important;
			/* override any inherited or conflicting styles */
		}

		.contact-button.linkedin i {
			color: white !important;
		}

		.contact-button.linkedin span,
		.contact-button.linkedin strong,
		.contact-button.linkedin em {
			color: white !important;
		}

		.contact-button.linkedin:hover {
			background-color: #084b9c;
			/* darker LinkedIn blue for hover */
			color: white !important;
			/* force white text */
			animation: pulse 0.8s ease-in-out;
		}

		.contact-button.linkedin:hover i {
			color: white !important;
			/* force white icon */
		}

		.contact-button {
			transition: background-color 0.3s ease, transform 0.2s ease, color 0.3s ease;
		}

		.contact-button:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
		}

		.contact-button i {
			font-size: 1.2em;
		}

		@media (max-width: 600px) {
			.contact-buttons {
				flex-direction: column;
				align-items: center;
			}
		}

		@keyframes pulse {
			0% {
				transform: scale(1);
				box-shadow: 0 0 0 rgba(255, 255, 255, 0.4);
			}

			50% {
				transform: scale(1.05);
				box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
			}

			100% {
				transform: scale(1);
				box-shadow: 0 0 0 rgba(255, 255, 255, 0.4);
			}
		}

		.contact-button.linkedin {
			animation: pulse 2.5s infinite;
		}
	</style>

	<script>
		document.querySelectorAll('a[href^="http"]').forEach(link => {
