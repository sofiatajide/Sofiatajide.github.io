	<script>
		const fullscreenBtn = document.getElementById('fullscreen-btn');
		const container = document.getElementById('pdf-container');

		fullscreenBtn.addEventListener('click', function (e) {
			e.stopPropagation(); // Prevent triggering PDF open

			if (document.fullscreenElement === container) {
				// Exit fullscreen
				if (document.exitFullscreen) {
					document.exitFullscreen();
				} else if (document.webkitExitFullscreen) {
					document.webkitExitFullscreen();
				} else if (document.msExitFullscreen) {
					document.msExitFullscreen();
				}
			} else {
				// Enter fullscreen
				if (container.requestFullscreen) {
					container.requestFullscreen();
				} else if (container.webkitRequestFullscreen) {
					container.webkitRequestFullscreen();
				} else if (container.msRequestFullscreen) {
					container.msRequestFullscreen();
				}
			}
		});

		document.addEventListener('fullscreenchange', function () {
			if (document.fullscreenElement === container) {
				fullscreenBtn.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M9 9H5v2h2v2h2V9zm6 0v4h2v-2h2V9h-4zm-6 6H5v2h2v2h2v-4zm6 0v4h2v-2h2v-2h-4z" fill="currentColor"/>
                </svg>
            `;
			} else {
				fullscreenBtn.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 3h6v2H5v4H3V3zm18 0v6h-2V5h-4V3h6zm0 18h-6v-2h4v-4h2v6zM3 21v-6h2v4h4v2H3z" fill="currentColor"/>
                </svg>
            `;
			}
		});

	</script>
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const elements = document.querySelectorAll('.section-divider, .section-heading');

			const observer = new IntersectionObserver(entries => {
				entries.forEach(entry => {
					if (entry.isIntersecting) {
						entry.target.classList.add('in-view');
					}
				});
			}, {
				threshold: 0.3
			});

			elements.forEach(el => observer.observe(el));
		});
	</script>
	<script>
		const track = document.querySelector('.cert-track');
		const items = document.querySelectorAll('.cert-item');
		const prevBtn = document.getElementById('prev-page');
		const nextBtn = document.getElementById('next-page');

		let currentIndex = 0;

		function updateCarousel() {
			const containerWidth = document.querySelector('.cert-carousel').clientWidth;
			const offset = -currentIndex * containerWidth;
			track.style.transform = `translateX(${offset}px)`;

			prevBtn.classList.toggle('hidden', currentIndex === 0);
			nextBtn.classList.toggle('hidden', currentIndex === items.length - 1);
		}

		prevBtn.addEventListener('click', () => {
			if (currentIndex > 0) {
				currentIndex--;
				updateCarousel();
			}
		});

		nextBtn.addEventListener('click', () => {
			if (currentIndex < items.length - 1) {
				currentIndex++;
				updateCarousel();
			}
		});

		window.addEventListener('resize', updateCarousel);
		window.addEventListener('load', updateCarousel);
	</script>
